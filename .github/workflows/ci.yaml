name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy

env:
  IMAGE_NAME: ci-html
  IMAGE_TAG: 1.0.1

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG

  scan-trivy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/ci-html:1.0.1"
          format: "table"
          exit-code: 1
          severity: "CRITICAL,HIGH"

  deploy:
    needs: scan-trivy
    runs-on: ubuntu-latest
    steps:
      - name: Final Deploy
        run: echo "Déploiement réussi sur Docker Hub !"
