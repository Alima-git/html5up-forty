name: CI-CD Pipeline Final

on:
  push:
    branches:
      - final

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:latest

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Final Deploy
        run: echo "Déploiement réussi sur la branche final !"